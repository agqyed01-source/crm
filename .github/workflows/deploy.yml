name: Deploy to VPS

on:
  push:
    branches:
      - main # Trigger deployment on push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build

      - name: Deploy to VPS via rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-rltgoDzvO --delete"
          # Here we sync everything excluding .git/, node_modules/, etc.
          # Or, better: we only sync dist/, package.json, package-lock.json and server.js
          SOURCE: ""
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: "/var/www/my-crm-app" # Replace with the actual path on your VPS
          EXCLUDE: "/.git/, /.github/, /node_modules/, /src/"
          SCRIPT_AFTER: |
            cd /var/www/my-crm-app
            npm install --omit=dev
            # Install PM2 globally if not exists, then start/restart the server on port 3002
            npm install -g pm2
            pm2 start server.js --name "my-crm-app" || pm2 restart "my-crm-app"
            pm2 save

