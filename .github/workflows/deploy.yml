name: Deploy to VPS

on:
  push:
    branches:
      - main # Trigger deployment on push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build

      - name: Deploy to VPS via rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: "-rltgoDzvO --delete"
          # Here we sync everything excluding .git/, node_modules/, etc.
          # Or, better: we only sync dist/, package.json, package-lock.json and server.js
          SOURCE: ""
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: "/opt/1panel/www/sites/crm" # Changed to requested directory
          EXCLUDE: "/.git/, /.github/, /node_modules/, /src/"
          SCRIPT_BEFORE: |
            mkdir -p /opt/1panel/www/sites/crm
          SCRIPT_AFTER: |
            # Load environment variables for non-interactive SSH (e.g., nvm)
            if [ -f ~/.bashrc ]; then source ~/.bashrc; fi
            if [ -f ~/.profile ]; then source ~/.profile; fi
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd /opt/1panel/www/sites/crm
            
            if ! command -v npm &> /dev/null; then
              echo "npm could not be found. Please make sure Node.js is installed on your server."
              exit 1
            fi
            
            npm install --omit=dev
            # Install PM2 globally if not exists, then start/restart the server
            npm install -g pm2
            pm2 delete "my-crm-app" || true
            PORT=3002 pm2 start dist/server.cjs --name "my-crm-app"
            pm2 save

